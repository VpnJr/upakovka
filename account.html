<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Личный кабинет — Upakovka09</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
.acc-wrap{max-width:900px;margin:0 auto;padding:32px 1.5rem}
.acc-header{display:flex;align-items:center;gap:20px;margin-bottom:32px;padding:24px;background:#fff;border-radius:var(--rl);border:1.5px solid var(--border)}
.acc-avatar{width:64px;height:64px;background:var(--brand);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;flex-shrink:0}
.acc-info h2{font-size:20px;font-weight:700;margin-bottom:4px}
.acc-info p{font-size:13px;color:var(--muted)}
.acc-tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:24px}
.acc-tab{padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.acc-tab:hover{color:#1a1a1a}
.acc-tab.active{color:var(--brand-d);border-bottom-color:var(--brand);font-weight:600}
.acc-pane{display:none}
.acc-pane.active{display:block}
/* Orders */
.order-hist{display:flex;flex-direction:column;gap:12px}
.oh-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--rl);overflow:hidden}
.oh-head{padding:12px 16px;background:var(--gray);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.oh-id{font-weight:700;font-size:14px}
.oh-date{font-size:12px;color:var(--muted)}
.oh-body{padding:14px 16px}
.oh-items{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.oh-item-tag{background:var(--gray);border-radius:var(--r);padding:4px 10px;font-size:12px}
.oh-footer{display:flex;align-items:center;justify-content:space-between}
.oh-total{font-size:16px;font-weight:700;color:var(--brand-d)}
.oh-status{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px}
.s-new{background:#fff0ee;color:var(--brand)}.s-proc{background:#fef9c3;color:#854d0e}.s-done{background:#f0fdf4;color:#166534}
/* Profile form */
.prof-form{background:#fff;border-radius:var(--rl);border:1.5px solid var(--border);padding:24px;max-width:480px}
.prof-form .fg{margin-bottom:16px}
.prof-form label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px}
.prof-form input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;outline:none;font-family:inherit;transition:border-color .15s}
.prof-form input:focus{border-color:var(--brand)}
.prof-form input:disabled{background:var(--gray);color:var(--muted)}
.empty-orders{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-orders .ei{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>
<header class="header">
  <a href="index.html" class="logo">Upakovka<span>09</span></a>
  <a href="index.html" class="back-link">← В каталог</a>
  <div class="header-right">
    <button class="cart-btn" onclick="openCart()">🛒 <span id="cart-label">Корзина</span></button>
  </div>
</header>

<div class="acc-wrap" id="acc-wrap">
  <div id="loading" style="text-align:center;padding:60px;color:var(--muted)">⏳ Загрузка…</div>
</div>

<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-drawer-header"><h2>Корзина</h2><button onclick="closeCart()">✕</button></div>
  <div class="cart-drawer-body" id="cart-drawer-body"></div>
  <div class="cart-drawer-footer" id="cart-drawer-footer" style="display:none">
    <div class="cart-drawer-total">Итого: <strong id="cart-total-val">0 ₽</strong></div>
    <a href="checkout.html" class="btn-primary btn-block">Оформить заказ →</a>
  </div>
</div>
<div id="cart-toast" class="cart-toast">✓ Добавлено</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script>
refreshCartUI();

var user = getCurrentUser();
if(!user){
  location.href = 'index.html';
}

function renderAccount(){
  var wrap = document.getElementById('acc-wrap');
  var initial = (user.name||user.email).charAt(0).toUpperCase();
  wrap.innerHTML =
    '<div class="acc-header">' +
      '<div class="acc-avatar">' + initial + '</div>' +
      '<div class="acc-info">' +
        '<h2>' + (user.name||'Покупатель') + '</h2>' +
        '<p>' + user.email + '</p>' +
      '</div>' +
      '<button class="btn-outline" style="margin-left:auto" onclick="doLogout()">Выйти</button>' +
    '</div>' +
    '<div class="acc-tabs">' +
      '<button class="acc-tab active" onclick="showAccTab(\'orders\',this)">📦 Мои заказы</button>' +
      '<button class="acc-tab" onclick="showAccTab(\'profile\',this)">👤 Профиль</button>' +
    '</div>' +
    '<div id="acc-orders" class="acc-pane active"><div style="color:var(--muted);padding:20px">⏳ Загружаем заказы…</div></div>' +
    '<div id="acc-profile" class="acc-pane"></div>';

  loadOrders();
  renderProfile();
}

function showAccTab(tab, el){
  document.querySelectorAll('.acc-tab').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.acc-pane').forEach(function(p){ p.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('acc-' + tab).classList.add('active');
}

function loadOrders(){
  var el = document.getElementById('acc-orders');
  loadUserOrders(user.uid, function(orders){
    if(!orders.length){
      el.innerHTML = '<div class="empty-orders"><div class="ei">📭</div><p>У вас пока нет заказов</p><a href="index.html" class="btn-primary" style="display:inline-block;margin-top:16px">Перейти в каталог</a></div>';
      return;
    }
    var scls = {new:'s-new', processing:'s-proc', done:'s-done'};
    var slbl = {new:'Новый', processing:'В обработке', done:'Выполнен'};
    el.innerHTML = '<div class="order-hist">' +
      orders.map(function(o){
        var items = (o.items||[]).map(function(i){
          return '<span class="oh-item-tag">' + i.emoji + ' ' + i.name + ' — ' + i.qty + ' шт.</span>';
        }).join('');
        return '<div class="oh-card">' +
          '<div class="oh-head">' +
            '<div><span class="oh-id">#' + o.id + '</span></div>' +
            '<div style="display:flex;align-items:center;gap:10px">' +
              '<span class="oh-date">' + o.time + '</span>' +
              '<span class="oh-status ' + (scls[o.status]||'s-new') + '">' + (slbl[o.status]||'Новый') + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="oh-body">' +
            '<div class="oh-items">' + items + '</div>' +
            '<div class="oh-footer">' +
              '<span class="oh-total">' + o.total + ' ₽</span>' +
              '<span style="font-size:12px;color:var(--muted)">' + o.delivery + ' · ' + o.payment + '</span>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('') +
    '</div>';
  });
}

function renderProfile(){
  var el = document.getElementById('acc-profile');
  el.innerHTML =
    '<div class="prof-form">' +
      '<div class="fg"><label>Имя</label><input id="pf-name" type="text" value="' + (user.name||'') + '"/></div>' +
      '<div class="fg"><label>Email</label><input type="email" value="' + user.email + '" disabled/></div>' +
      '<button class="btn-primary" onclick="saveProfile()">Сохранить</button>' +
      '<div id="pf-msg" style="margin-top:10px;font-size:13px;display:none"></div>' +
    '</div>';
}

function saveProfile(){
  var name = document.getElementById('pf-name').value.trim();
  if(!name) return;
  user.name = name;
  setCurrentUser(user);
  saveUserProfile(user.uid, {name:name, email:user.email}, function(){
    var msg = document.getElementById('pf-msg');
    msg.textContent = '✓ Сохранено';
    msg.style.color = '#16a34a';
    msg.style.display = 'block';
    setTimeout(function(){ msg.style.display='none'; }, 2500);
  });
}

function doLogout(){
  authLogout();
  location.href = 'index.html';
}

if(user) renderAccount();
</script>
</body>
</html>
