<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Панель администратора — Upakovka09</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body class="admin-body">

  <header class="admin-header">
    <div class="logo">Upakovka<span>09</span> <span class="admin-badge">Админ</span></div>
    <div class="admin-nav">
      <span id="admin-clock"></span>
      <a href="index.html" target="_blank" class="btn-outline-sm">Открыть сайт ↗</a>
    </div>
  </header>

  <!-- ЕСЛИ НЕ АВТОРИЗОВАН -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <h2>Вход в панель</h2>
      <p>Введите пароль администратора</p>
      <div class="field">
        <input type="password" id="admin-password" placeholder="Пароль" onkeydown="if(event.key==='Enter') adminLogin()" />
        <span class="field-error" id="login-error">Неверный пароль</span>
      </div>
      <button class="btn-primary btn-block" onclick="adminLogin()">Войти</button>
      <p class="form-note">Пароль задаётся в файле js/admin.js</p>
    </div>
  </div>

  <!-- ПАНЕЛЬ -->
  <div id="admin-panel" style="display:none" class="admin-panel">

    <div class="admin-stats">
      <div class="stat-card">
        <div class="stat-label">Всего заказов</div>
        <div class="stat-value" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Новых</div>
        <div class="stat-value accent" id="stat-new">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">В обработке</div>
        <div class="stat-value" id="stat-processing">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Выполнено</div>
        <div class="stat-value green" id="stat-done">0</div>
      </div>
    </div>

    <div class="admin-toolbar">
      <h2 class="admin-title">Заказы</h2>
      <div class="toolbar-right">
        <button class="btn-outline-sm" onclick="filterOrders('all')" id="filter-all">Все</button>
        <button class="btn-outline-sm" onclick="filterOrders('new')" id="filter-new">Новые</button>
        <button class="btn-outline-sm" onclick="filterOrders('processing')" id="filter-processing">В обработке</button>
        <button class="btn-outline-sm" onclick="clearOrders()">🗑 Очистить всё</button>
      </div>
    </div>

    <div id="orders-list" class="orders-list"></div>

    <div id="no-orders" class="no-orders" style="display:none">
      <p>Заказов пока нет</p>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
