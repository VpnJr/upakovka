<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Товар — Upakovka09</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<header class="header">
  <a href="index.html" class="logo">Upakovka<span>09</span></a>
  <a href="index.html" class="back-link">← В каталог</a>
  <div class="header-right">
    <button class="cart-btn" onclick="openCart()">🛒 Корзина <span class="cart-count-badge cart-badge">0</span></button>
  </div>
</header>

<div id="breadcrumb-wrap"></div>
<div id="product-wrap"></div>
<div id="specs-wrap"></div>
<div id="related-wrap"></div>

<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-drawer-header"><h2>Корзина <span class="cart-count-badge cart-badge">0</span></h2><button onclick="closeCart()">✕</button></div>
  <div class="cart-drawer-body" id="cart-drawer-body"></div>
  <div class="cart-drawer-footer" id="cart-drawer-footer" style="display:none">
    <div class="cart-drawer-total">Итого: <strong id="cart-total-val">0 ₽</strong></div>
    <a href="checkout.html" class="btn-primary btn-block">Оформить заказ →</a>
  </div>
</div>
<div id="cart-toast" class="cart-toast">✓ Товар добавлен в корзину</div>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script>
(function(){
  var id=parseInt(new URLSearchParams(location.search).get('id'));
  var p=getProducts().find(function(x){return x.id===id;});
  refreshCartUI();

  if(!p){
    document.getElementById('product-wrap').innerHTML='<div class="not-found"><h2>Товар не найден</h2><a href="index.html" class="btn-primary" style="margin-top:16px">← В каталог</a></div>';
    return;
  }
  document.title=p.name+' — Upakovka09';

  document.getElementById('breadcrumb-wrap').innerHTML=
    '<div class="breadcrumb"><a href="index.html">Главная</a> › <a href="index.html#catalog">Каталог</a> › '+p.name+'</div>';

  var BADGE_L={hit:'Хит продаж',new:'Новинка',eco:'Эко',sale:'Скидка'};
  var BADGE_C={hit:'badge-hit',new:'badge-new',eco:'badge-eco',sale:'badge-sale'};
  var discounts=[
    {min:50,max:99,label:'50–99 шт',mult:1.33},
    {min:100,max:499,label:'100–499 шт',mult:1},
    {min:500,max:999,label:'500–999 шт',mult:0.76},
    {min:1000,max:99999,label:'от 1000 шт',mult:0.59}
  ];

  var mainImgHtml=p.photo
    ?'<img src="'+p.photo+'" id="main-img-el" alt="'+p.name+'">'
    :'<span id="main-img-el" style="font-size:110px">'+p.emoji+'</span>';

  document.getElementById('product-wrap').innerHTML=
    '<div class="product-page-wrap">'+
      '<div class="gallery">'+
        '<div class="main-img" id="main-img">'+mainImgHtml+'</div>'+
        '<div class="thumbs">'+
          '<div class="thumb active" data-src="'+(p.photo||'')+'" data-emoji="'+p.emoji+'" onclick="setThumb(this)">'+
            (p.photo?'<img src="'+p.photo+'" alt="">':p.emoji)+
          '</div>'+
          '<div class="thumb" data-src="" data-emoji="📸" onclick="setThumb(this)">📸</div>'+
          '<div class="thumb" data-src="" data-emoji="📐" onclick="setThumb(this)">📐</div>'+
        '</div>'+
      '</div>'+
      '<div class="pinfo">'+
        (p.badge?'<span class="pbadge '+BADGE_C[p.badge]+'">'+BADGE_L[p.badge]+'</span>':'')+
        '<h1 class="ptitle">'+p.name+'</h1>'+
        '<div class="pmeta">'+p.meta+'</div>'+
        '<div class="prating">★★★★★ <span>4.8 · 142 отзыва · Арт. UP-00'+p.id+'</span></div>'+
        '<div class="pricebox">'+
          '<div class="price-main" id="price-display">'+p.price.toFixed(2)+' ₽</div>'+
          (p.oldPrice?'<div class="price-old">'+p.oldPrice.toFixed(2)+' ₽</div>':'')+
          '<div class="price-per">за 1 штуку</div>'+
          '<div class="price-total">Итого: <strong id="total-display">'+(p.price*100).toFixed(2)+'</strong> ₽ за <strong id="qty-display">100</strong> шт.</div>'+
        '</div>'+
        '<div class="field-label" style="margin-top:2px">Количество</div>'+
        '<div class="qty-row">'+
          '<div class="qty-ctrl">'+
            '<button onclick="chQty(-1)">−</button>'+
            '<span id="qty-num">100</span>'+
            '<button onclick="chQty(1)">+</button>'+
          '</div>'+
          '<span class="qty-hint">Минимум 50 шт.</span>'+
        '</div>'+
        '<div class="field-label">Оптовые скидки</div>'+
        '<table class="disc-table">'+
          '<thead><tr><th>Количество</th><th>Цена / шт.</th><th>Скидка</th></tr></thead><tbody>'+
          discounts.map(function(d,i){
            return '<tr class="'+(i===1?'disc-active':'')+'" id="dr-'+i+'">'+
              '<td>'+d.label+'</td><td>'+(p.price*d.mult).toFixed(2)+' ₽</td>'+
              '<td>'+(d.mult<1?'-'+Math.round((1-d.mult)*100)+'%':'—')+'</td></tr>';
          }).join('')+
          '</tbody></table>'+
        '<div class="btn-row">'+
          '<button class="btn-primary btn-big" id="add-btn" onclick="doAdd()">+ В корзину</button>'+
          '<button class="btn-wish" id="wish-btn" onclick="toggleWish(this)">♡</button>'+
        '</div>'+
        '<div class="pfeatures">'+
          '<span>🚚 Доставка 1–2 дня</span>'+
          '<span>📄 Счёт для юрлиц</span>'+
          '<span>↩️ Возврат 14 дней</span>'+
        '</div>'+
      '</div>'+
    '</div>';

  document.getElementById('specs-wrap').innerHTML=
    '<div class="specs-section">'+
      '<h2 class="section-title">Характеристики</h2>'+
      '<div class="specs-grid">'+
        '<div class="spec"><div class="spec-l">Материал</div><div class="spec-v">'+p.material+'</div></div>'+
        '<div class="spec"><div class="spec-l">Объём</div><div class="spec-v">'+p.volume+'</div></div>'+
        '<div class="spec"><div class="spec-l">Размер</div><div class="spec-v">'+p.size+'</div></div>'+
        '<div class="spec"><div class="spec-l">В упаковке</div><div class="spec-v">50 шт.</div></div>'+
        '<div class="spec"><div class="spec-l">Горячее</div><div class="spec-v">до +120°C</div></div>'+
        '<div class="spec"><div class="spec-l">Заморозка</div><div class="spec-v">до −40°C</div></div>'+
      '</div>'+
    '</div>';

  // Похожие
  var rel=getProducts().filter(function(x){return x.cat===p.cat&&x.id!==p.id;}).slice(0,4);
  if(rel.length){
    var BADGE_C2={hit:'badge-hit',new:'badge-new',eco:'badge-eco',sale:'badge-sale'};
    document.getElementById('related-wrap').innerHTML=
      '<div class="section"><h2 class="section-title">Похожие товары</h2>'+
      '<div class="products-grid" style="max-width:1100px">'+
        rel.map(function(r){
          var ri=r.photo?'<img src="'+r.photo+'" alt="'+r.name+'">'
            :'<div class="card-emoji">'+r.emoji+'</div>';
          return '<div class="product-card" onclick="location.href=\'product.html?id='+r.id+'\'">'+
            '<div class="product-img">'+ri+
              (r.badge?'<span class="product-badge '+BADGE_C2[r.badge]+'">'+r.badge+'</span>':'')+
            '</div>'+
            '<div class="product-info">'+
              '<div class="product-name">'+r.name+'</div>'+
              '<div class="product-meta">'+r.meta+'</div>'+
              '<div class="product-price-row"><div class="product-price">'+r.price.toFixed(2)+' ₽</div></div>'+
              '<button class="add-cart-btn" onclick="event.stopPropagation();addToCart('+r.id+',50);this.textContent=\'✓ Добавлено\';this.classList.add(\'added\');var _t=this;setTimeout(function(){_t.textContent=\'+ В корзину\';_t.classList.remove(\'added\');},1600)">+ В корзину</button>'+
            '</div></div>';
        }).join('')+
      '</div></div>';
  }

  var qty=100;
  window.setThumb=function(el){
    document.querySelectorAll('.thumb').forEach(function(t){t.classList.remove('active');});
    el.classList.add('active');
    var mi=document.getElementById('main-img');
    var src=el.dataset.src;
    if(src){ mi.innerHTML='<img src="'+src+'" alt="">'; }
    else { mi.innerHTML='<span style="font-size:110px">'+el.dataset.emoji+'</span>'; }
  };
  window.chQty=function(dir){
    var step=qty<100?10:qty<500?50:100;
    qty=Math.max(50,qty+dir*step);
    document.getElementById('qty-num').textContent=qty;
    var row=qty<100?0:qty<500?1:qty<1000?2:3;
    var mult=[1.33,1,0.76,0.59][row];
    var up=p.price*mult;
    document.getElementById('price-display').textContent=up.toFixed(2)+' ₽';
    document.getElementById('qty-display').textContent=qty;
    document.getElementById('total-display').textContent=(up*qty).toFixed(2);
    for(var i=0;i<4;i++){
      var el=document.getElementById('dr-'+i);
      if(el) el.classList.toggle('disc-active',i===row);
    }
  };
  window.doAdd=function(){
    addToCart(p.id,qty);
    var btn=document.getElementById('add-btn');
    btn.textContent='✓ Добавлено!';
    btn.style.background='#16a34a';
    setTimeout(function(){btn.textContent='+ В корзину';btn.style.background='';},1800);
  };
  window.toggleWish=function(btn){
    btn.classList.toggle('wished');
    btn.textContent=btn.classList.contains('wished')?'♥':'♡';
  };
})();
</script>
</body>
</html>
